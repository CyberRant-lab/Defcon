# ModSecurity custom config — Demo-3 WAF
# DEFCON Coimbatore 2026

Include /etc/modsecurity.d/modsecurity.conf
Include /etc/modsecurity.d/owasp-crs/crs-setup.conf
Include /etc/modsecurity.d/owasp-crs/rules/*.conf

# Enforcement mode — actually block (not just detect)
SecRuleEngine On

# Audit log — guardian reads this file for real WAF events
SecAuditEngine RelevantOnly
SecAuditLog /var/log/modsec/audit.log
SecAuditLogFormat JSON
SecAuditLogParts ABCFHZ

# Request body inspection
SecRequestBodyAccess On
SecRequestBodyLimit 13107200

# Response body inspection
SecResponseBodyAccess On

# Paranoia level 1 — catches SQLi, XSS, path traversal without false positives
SecAction "id:900000, phase:1, pass, t:none, setvar:tx.paranoia_level=1"

# Block score threshold
SecAction "id:900110, phase:1, pass, t:none, setvar:tx.inbound_anomaly_score_threshold=5"

# Custom rule — log attack type for dashboard
SecRule REQUEST_URI "@contains login" \
    "id:10001, phase:2, pass, \
     msg:'Login endpoint accessed — monitoring for credential attacks', \
     logdata:'%{REQUEST_URI}'"
