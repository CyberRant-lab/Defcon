<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Phoenix App — Tier 1 Web</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:#0A0A0F;color:#F5F5F5;font-family:'Consolas','Courier New',monospace;
       display:flex;align-items:center;justify-content:center;min-height:100vh}
  .card{border:2px solid #00D68F;padding:36px 48px;max-width:560px;width:90%;text-align:center}
  .status{display:inline-block;background:#00D68F;color:#0A0A0F;font-size:10px;

  .sub{font-size:12px;color:#8888AA;letter-spacing:2px;margin-bottom:24px}
  .tier{font-size:11px;color:#8888AA;margin-bottom:6px}
  .tier span{color:#00D68F}
  .bvr{margin-top:20px;padding-top:16px;border-top:1px solid #1E1E2A;
       font-size:10px;color:#8888AA;letter-spacing:1px}
</style>
</head>
<body>
<div class="card">
  <div class="status">■ SERVICE OPERATIONAL</div>
  <h1>PHOENIX APP</h1>
  <div class="sub">DEFCON COIMBATORE 2026 · THREE-TIER DEMO</div>
  <div class="tier">TIER 1 · <span>WEB LAYER</span> · nginx:alpine · IMMUTABLE</div>
  <div class="tier">TIER 2 · <span>APP SERVER</span> · Flask API · port 3001</div>
  <div class="tier">TIER 3 · <span>DATABASE</span> · PostgreSQL · primary + replica</div>

</div>
